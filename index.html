<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Taskwai" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskwai - Dashboard Usaha Anda</title>
    <meta name="google-site-verification" content="zbTX7FFJpqGeVHJ7kTgYYFFiJ3UEeQKsTilZ9GGQVmo" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
      // Clear any legacy service worker registrations and caches immediately
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }

      // Force unregister service workers and clear cache storage
      function forceRecovery() {
        console.log("Force recovery triggered. Clearing all cache and service workers...");
        sessionStorage.removeItem('taskwai_main_reload');
        sessionStorage.removeItem('taskwai_active_tab');
        
        var clearSW = new Promise(function(resolve) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              var unregisterPromises = [];
              for (var i = 0; i < registrations.length; i++) {
                unregisterPromises.push(registrations[i].unregister());
              }
              Promise.all(unregisterPromises).then(function() {
                resolve();
              }).catch(function() {
                resolve();
              });
            }).catch(function() {
              resolve();
            });
          } else {
            resolve();
          }
        });

        var clearCaches = new Promise(function(resolve) {
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              var deletePromises = [];
              keys.forEach(function(key) {
                deletePromises.push(caches.delete(key));
              });
              Promise.all(deletePromises).then(function() {
                resolve();
              }).catch(function() {
                resolve();
              });
            }).catch(function() {
              resolve();
            });
          } else {
            resolve();
          }
        });

        Promise.all([clearSW, clearCaches]).then(function() {
          console.log("Cleanup finished. Reloading page...");
          window.location.reload();
        });
      }

      // Handler for main script load failures (e.g. bundle cache mismatch)
      function handleScriptError() {
        console.warn("Main bundle failed to load. Triggering reload...");
        var key = "taskwai_main_reload";
        var last = sessionStorage.getItem(key);
        var now = Date.now();
        // Only auto-reload once per 20 seconds to prevent infinite reload loops
        if (!last || now - parseInt(last, 10) > 20000) {
          sessionStorage.setItem(key, String(now));
          window.location.reload();
        } else {
          console.error("Main bundle failed to load repeatedly. Showing recovery UI.");
          var root = document.getElementById("root");
          if (root) {
            root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;padding:2rem;text-align:center;font-family:system-ui,sans-serif;gap:1.2rem;background:#09090b;color:#f4f4f5;">' +
              '<div style="font-size:3rem;">⚡</div>' +
              '<h2 style="font-weight:800;font-size:1.5rem;margin:0;color:#f4f4f5;letter-spacing:-0.025em;">Pembaruan Aplikasi Tersedia</h2>' +
              '<p style="color:#a1a1aa;max-width:360px;line-height:1.6;font-size:0.9rem;margin:0 0 0.5rem 0;">Aplikasi telah diperbarui ke versi terbaru. Browser Anda masih memuat versi lama dari cache.</p>' +
              '<button onclick="forceRecovery();" style="padding:0.75rem 2rem;background:#10b981;color:#fff;border:none;border-radius:0.5rem;font-weight:600;font-size:0.95rem;cursor:pointer;box-shadow:0 4px 12px rgba(16,185,129,0.2);transition:all 0.2s;">🔄 Muat Ulang</button>' +
              '<p style="font-size:0.8rem;color:#71717a;margin:0;">Atau tekan tombol <b style="color:#e4e4e7;font-family:monospace;background:#27272a;padding:2px 6px;border-radius:4px;border:1px solid #3f3f46;">Ctrl + F5</b> pada keyboard Anda.</p>' +
              '</div>';
          }
        }
      }

      // Add a global capturer for script loading errors to bypass Vite's onerror removal
      window.addEventListener('error', function(event) {
        var target = event.target;
        if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
          var url = target.src || target.href;
          if (url && (url.indexOf('index') > -1 || url.indexOf('assets/') > -1)) {
            handleScriptError();
          }
        }
      }, true); // True is critical for capturing resource errors
    </script>

    <!-- Preconnect to Google Fonts and Firebase for early connection handshakes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />

    <!-- Load fonts in parallel to prevent layout shifts (FOIT/FOUT) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
