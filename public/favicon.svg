<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Modern high-contrast bright emerald/neon green gradient -->
    <linearGradient id="neonGreenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <!-- Premium dark slate squircle background for high contrast on all themes -->
  <rect width="512" height="512" rx="144" fill="#090D16" />

  <!-- 
    The "T-Profit" Logo:
    A clever, ultra-clean 3-bar chart showing growth and profit.
    The center bar is perfectly integrated with a crossbar to form a bold, professional letter "T" (Taskwai).
  -->
  <g fill="url(#neonGreenGrad)">
    <!-- Left Bar (Short) -->
    <rect x="120" y="260" width="48" height="140" rx="24" />

    <!-- Center Bar (T-Stem, Medium) -->
    <rect x="232" y="200" width="48" height="200" rx="24" />
    
    <!-- T-Crossbar (Perfectly centered on the T-Stem) -->
    <rect x="188" y="140" width="136" height="48" rx="24" />

    <!-- Right Bar (Tallest) -->
    <rect x="344" y="80" width="48" height="320" rx="24" />
  </g>
</svg>
